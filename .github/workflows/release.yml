name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'ObeliskLauncher.csproj'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-tag: ${{ steps.version.outputs.version-tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' ObeliskLauncher.csproj)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version-tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

  check-release-exists:
    runs-on: ubuntu-latest
    needs: extract-version
    outputs:
      release-exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ needs.extract-version.outputs.version-tag }}" --repo "${{ github.repository }}" &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ needs.extract-version.outputs.version-tag }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ needs.extract-version.outputs.version-tag }} does not exist, will create"
          fi

  build-windows:
    runs-on: windows-latest
    needs: [extract-version, check-release-exists]
    if: needs.check-release-exists.outputs.release-exists == 'false'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build project
        run: dotnet build ObeliskLauncher.csproj -c Release -p:SignAssembly=false
      
      - name: Publish Windows Release
        run: dotnet publish ObeliskLauncher.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:SignAssembly=false -o artifacts/publish/win-x64
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: artifacts/publish/win-x64/ObeliskLauncher.exe
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    needs: [extract-version, check-release-exists]
    if: needs.check-release-exists.outputs.release-exists == 'false'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build project
        run: dotnet build ObeliskLauncher.csproj -c Release -p:SignAssembly=false
      
      - name: Build AppImage
        run: SIGN_ASSEMBLY=false APPIMAGE_EXTRACT_AND_RUN=1 bash scripts/build-appimage.sh
      
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/ObeliskLauncher-x86_64.AppImage
          retention-days: 1

      - name: Upload Linux Tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: artifacts/ObeliskLauncher-linux-x86_64.tar.gz
          retention-days: 1

  create-release:
    runs-on: ubuntu-latest
    needs: [extract-version, check-release-exists, build-windows, build-linux]
    if: needs.check-release-exists.outputs.release-exists == 'false'
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./artifacts/windows
      
      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./artifacts/linux-appimage

      - name: Download Linux Tarball
        uses: actions/download-artifact@v4
        with:
          name: linux-tarball
          path: ./artifacts/linux-tarball
      
      - name: Rename artifacts
        run: |
          mv ./artifacts/windows/ObeliskLauncher.exe ./artifacts/ObeliskLauncher-win-x64.exe
          mv ./artifacts/linux-appimage/ObeliskLauncher-x86_64.AppImage ./artifacts/ObeliskLauncher-linux-x86_64.AppImage
          mv ./artifacts/linux-tarball/ObeliskLauncher-linux-x86_64.tar.gz ./artifacts/ObeliskLauncher-linux-x86_64.tar.gz
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.extract-version.outputs.version-tag }}" \
            ./artifacts/ObeliskLauncher-win-x64.exe \
            ./artifacts/ObeliskLauncher-linux-x86_64.AppImage \
            ./artifacts/ObeliskLauncher-linux-x86_64.tar.gz \
            --title "Obelisk Launcher ${{ needs.extract-version.outputs.version }}" \
            --notes "Release built from version ${{ needs.extract-version.outputs.version }} in ObeliskLauncher.csproj"
